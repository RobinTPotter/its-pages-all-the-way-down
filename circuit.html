<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Stripboard Demo (Connectivity Fixed)</title>
  <style>
    svg {
      border: 1px solid #ccc;
      background: #fafafa;
    }

    .strip {
      stroke: gold;
      stroke-width: 6;
    }

    .hole {
      fill: black;
    }

    .cut {
      stroke: black;
      stroke-width: 3;
    }

    .component {
      fill: lightblue;
      opacity: 0.8;
      stroke: black;
    }

    .pin {
      fill: red;
    }

    .lead {
      stroke: black;
      stroke-width: 2;
    }

    .jumper {
      stroke: green;
      stroke-width: 3;
      stroke-linecap: round;
    }

    .label {
      font-size: 10px;
      text-anchor: middle;
    }

    .overlay {
      fill: rgba(0, 0, 255, 0.08);
      filter: blur(3px);
      pointer-events: none;
    }

    body {
      user-select: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-panel {
      width: min(95vw, 1100px);
      height: min(90vh, 850px);
      background: white;
      border: 1px solid #bbb;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-panel h2 {
      margin: 0;
      font-size: 18px;
    }

    #dataEditor {
      flex: 1;
      width: 100%;
      resize: none;
      font-family: Consolas, monospace;
      font-size: 14px;
      line-height: 1.35;
      padding: 10px;
      box-sizing: border-box;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .component-form {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 10px 12px;
      align-items: center;
      font-size: 14px;
    }

    .component-form input,
    .component-form select {
      font-size: 14px;
      padding: 6px 8px;
      border: 1px solid #bbb;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
    }

    .component-form .hint {
      grid-column: 1 / -1;
      color: #666;
      font-size: 12px;
      line-height: 1.35;
    }

    .component-form .check-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .component-form .check-row input {
      width: auto;
      margin: 0;
    }
  </style>
</head>

<body>

  <button onclick="toggleOverlay()">Toggle Connectivity</button>
  <label style="margin-left: 12px; font-size: 14px;">
    <input id="labelByNet" type="checkbox" onchange="render()">
    Label pins by net
  </label>
  <label style="margin-left: 12px; font-size: 14px;">
    <input id="cutsOnTop" type="checkbox" onchange="render()">
    Cuts on top
  </label>
  <button style="margin-left: 12px;" onclick="openDataEditor()">Edit Data</button>
  <button style="margin-left: 12px;" onclick="openComponentEditor()">New Component (C)</button>
  <br><br>

  <svg id="board" width="900" height="600"></svg>

  <div id="dataModal" class="modal-backdrop">
    <div class="modal-panel">
      <h2>Board Data JSON</h2>
      <textarea id="dataEditor" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button onclick="closeDataEditor()">Cancel</button>
        <button onclick="applyDataEditor()">OK</button>
      </div>
    </div>
  </div>

  <div id="componentModal" class="modal-backdrop">
    <div class="modal-panel" style="width:min(92vw,560px);height:auto;">
      <h2>Add Component</h2>
      <div class="component-form">
        <label for="newCompId">Component ID</label>
        <input id="newCompId" type="text" placeholder="R2, U1, LED2">

        <label for="newCompOrientation">Orientation</label>
        <select id="newCompOrientation">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>

        <label for="newCompLegs">Number of legs</label>
        <input id="newCompLegs" type="number" min="2" max="25" value="2">

        <label for="newCompSize">Size (cols,rows)</label>
        <input id="newCompSize" type="text" placeholder="1,6 or 6,1">

        <label for="newCompLabels">Pin labels (comma separated)</label>
        <input id="newCompLabels" type="text" placeholder="1,2 or A,C or VCC,GND">

        <label for="newCompNets">Pin nets (optional, comma separated)</label>
        <input id="newCompNets" type="text" placeholder="N1,GND">

        <label class="check-row" for="newCompSplitSides">
          <input id="newCompSplitSides" type="checkbox">
          Distribute legs on both sides (DIP style)
        </label>

        <div class="hint">
          Size controls footprint width/height in board holes. Split mode places pins on opposite sides like the 555.
        </div>
      </div>
      <div class="modal-actions">
        <button onclick="closeComponentEditor()">Cancel</button>
        <button onclick="applyComponentEditor()">Add</button>
      </div>
    </div>
  </div>

  <script>

    let dragging = null;

    let creatingJumper = null;

    let labelPinsByNet = false;

    let selectedComponentId = null;

    function snap(x, y) {
      const col = Math.round((x - 50) / spacing);
      const row = Math.round((y - 50) / spacing);

      return {
        row: Math.max(0, Math.min(rows - 1, row)),
        col: Math.max(0, Math.min(cols - 1, col))
      };
    }

    // ---------------- DATA ----------------

    const boardData = {
    "components": [
        {

                    "id": "+",

                },
                {

                }
            ]
        },
        {

                }
            ]
        },

                {

                },
                {

                }
            ]
        },
        {

            "canRotate": false,
            "pins": [
                {
                    "id": "1",

                },
                {

                },
                {

                },

                },
                {

                    "net": "DISCH"
                },
                {
                    "id": "8",
                    "net": "VCC"
                }
            ]
        }
    ],
    "pins": {
        "555": {
            "1": {
                "row": 5,
                "col": 13
            },
            "2": {
                "row": 6,
                "col": 13
            },
            "3": {
                "row": 7,
                "col": 13
            },
            "4": {
                "row": 8,
                "col": 13
            },
            "5": {
                "row": 8,
                "col": 16
            },
            "6": {
                "row": 7,
                "col": 16
            },
            "7": {
                "row": 6,
                "col": 16
            },
            "8": {
                "row": 5,
                "col": 16
            }
        },
        "BAT1": {
            "+": {
                "row": 0,
                "col": 3
            },
            "-": {
                "row": 14,
                "col": 3
            }
        },
        "R1": {
            "1": {
                "row": 0,
                "col": 6
            },
            "2": {
                "row": 2,
                "col": 6
            }
        },
        "LED1": {
            "A": {
                "row": 11,
                "col": 6
            },
            "C": {
                "row": 14,
                "col": 6
            }
        }
    },
    "cuts": [
        {
            "row": 5,
            "col": 14
        },
        {
            "row": 6,
            "col": 14
        },
        {
            "row": 7,
            "col": 14
        },
        {
            "row": 8,
            "col": 14
        },
        {
            "row": 5,
            "col": 10
        },
        {
            "row": 6,
            "col": 10
        },
        {
            "row": 7,
            "col": 10
        },
        {
            "row": 8,
            "col": 10
        }
    ],
    "jumpers": [
        {
            "from": {
                "row": 2,
                "col": 7
            },
            "to": {
                "row": 11,
                "col": 7
            }
        }
    ]
};

    // ---------------- CONFIG ----------------

    const rows = 15;
    const cols = 25;
    const spacing = 25;

    const svg = document.getElementById("board");
    const dataModal = document.getElementById("dataModal");
    const dataEditor = document.getElementById("dataEditor");
    const componentModal = document.getElementById("componentModal");
    const newCompIdInput = document.getElementById("newCompId");
    const newCompOrientationSelect = document.getElementById("newCompOrientation");
    const newCompLegsInput = document.getElementById("newCompLegs");
    const newCompSizeInput = document.getElementById("newCompSize");
    const newCompLabelsInput = document.getElementById("newCompLabels");
    const newCompNetsInput = document.getElementById("newCompNets");
    const newCompSplitSidesInput = document.getElementById("newCompSplitSides");

    // ---------------- HELPERS ----------------

    function create(tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (let k in attrs) el.setAttribute(k, attrs[k]);
      return el;
    }

    function pos(row, col) {
      return {
        x: col * spacing + 50,
        y: row * spacing + 50
      };
    }

    function key(r, c) {
      return `${r},${c}`;
    }

    function rotateComponentClockwise(compId) {
      const comp = boardData.components.find(c => c.id === compId);
      const pinMap = boardData.pins[compId];
      if (!comp || !pinMap) return;
      if (comp.canRotate === false) return;

      const coords = comp.pins
        .map(pin => pinMap[pin.id])
        .filter(Boolean);

      if (coords.length < 2) return;

      const centerRow = coords.reduce((sum, p) => sum + p.row, 0) / coords.length;
      const centerCol = coords.reduce((sum, p) => sum + p.col, 0) / coords.length;

      comp.pins.forEach(pin => {
        const p = pinMap[pin.id];
        if (!p) return;

        const relRow = p.row - centerRow;
        const relCol = p.col - centerCol;

        const newRow = centerRow - relCol;
        const newCol = centerCol + relRow;

        pinMap[pin.id] = {
          row: Math.max(0, Math.min(rows - 1, Math.round(newRow))),
          col: Math.max(0, Math.min(cols - 1, Math.round(newCol)))
        };
      });
    }

    function buildUniqueComponentId(baseId) {
      const existing = new Set(boardData.components.map(c => c.id));
      if (!existing.has(baseId)) return baseId;

      let i = 2;
      while (existing.has(`${baseId}_${i}`)) i++;
      return `${baseId}_${i}`;
    }

    function duplicateSelectedComponent() {
      if (!selectedComponentId) return;

      const sourceComp = boardData.components.find(c => c.id === selectedComponentId);
      const sourcePins = boardData.pins[selectedComponentId];
      if (!sourceComp || !sourcePins) return;

      const newId = buildUniqueComponentId(`${sourceComp.id}_copy`);

      const coords = sourceComp.pins
        .map(pin => sourcePins[pin.id])
        .filter(Boolean);

      if (coords.length === 0) return;

      const canOffsetPos = coords.every(p => p.row < rows - 1 && p.col < cols - 1);
      const canOffsetNeg = coords.every(p => p.row > 0 && p.col > 0);
      const d = canOffsetPos ? 1 : (canOffsetNeg ? -1 : 0);

      const newComp = {
        ...sourceComp,
        id: newId,
        pins: sourceComp.pins.map(pin => ({ ...pin })),
        footprint: sourceComp.footprint ? { ...sourceComp.footprint } : sourceComp.footprint
      };

      const newPinMap = {};
      sourceComp.pins.forEach(pin => {
        const p = sourcePins[pin.id];
        if (!p) return;
        newPinMap[pin.id] = {
          row: Math.max(0, Math.min(rows - 1, p.row + d)),
          col: Math.max(0, Math.min(cols - 1, p.col + d))
        };
      });

      boardData.components.push(newComp);
      boardData.pins[newId] = newPinMap;
      selectedComponentId = newId;
      render();
    }

    function getBoardDataSnapshot() {
      return boardData;
    }

    function replaceObject(target, source) {
      Object.keys(target).forEach(k => delete target[k]);
      Object.assign(target, source);
    }

    function openDataEditor() {
      dataEditor.value = JSON.stringify(getBoardDataSnapshot(), null, 4);
      dataModal.style.display = "flex";
      dataEditor.focus();
    }

    function closeDataEditor() {
      dataModal.style.display = "none";
    }

    function applyDataEditor() {
      let parsed;

      try {
        parsed = JSON.parse(dataEditor.value);
      } catch (err) {
        alert(`Invalid JSON: ${err.message}`);
        return;
      }

      if (!parsed || typeof parsed !== "object") {
        alert("Data must be a JSON object.");
        return;
      }

      if (!Array.isArray(parsed.components)) {
        alert("components must be an array.");
        return;
      }

      if (!parsed.pins || typeof parsed.pins !== "object" || Array.isArray(parsed.pins)) {
        alert("pins must be an object.");
        return;
      }

      if (!Array.isArray(parsed.cuts)) {
        alert("cuts must be an array.");
        return;
      }

      if (!Array.isArray(parsed.jumpers)) {
        alert("jumpers must be an array.");
        return;
      }

      Object.assign(boardData, parsed);

      creatingJumper = null;
      dragging = null;
      selectedComponentId = null;

      closeDataEditor();
      render();
    }

    function openComponentEditor() {
      newCompIdInput.value = "";
      newCompOrientationSelect.value = "horizontal";
      newCompLegsInput.value = "2";
      newCompSizeInput.value = "";
      newCompLabelsInput.value = "";
      newCompNetsInput.value = "";
      newCompSplitSidesInput.checked = false;
      componentModal.style.display = "flex";
      newCompIdInput.focus();
    }

    function closeComponentEditor() {
      componentModal.style.display = "none";
    }

    function parseCsvList(inputValue) {
      return String(inputValue || "")
        .split(",")
        .map(x => x.trim())
        .filter(Boolean);
    }

    function parseSizeInput(sizeText) {
      const cleaned = String(sizeText || "").trim();
      if (!cleaned) return { width: null, height: null };

      const parts = cleaned.split(",").map(x => x.trim());
      if (parts.length !== 2) {
        throw new Error("Size must be in cols,rows format like 1,6 or 6,1.");
      }

      const width = Number(parts[0]);
      const height = Number(parts[1]);

      if (!Number.isInteger(width) || !Number.isInteger(height) || width < 1 || height < 1) {
        throw new Error("Size values must be positive integers.");
      }

      return { width, height };
    }

    function buildLinearPinPositions(legs, orientation, footprint) {
      const centerRow = Math.floor(rows / 2);
      const centerCol = Math.floor(cols / 2);

      const requestedSpan = orientation === "vertical"
        ? ((footprint && footprint.height) || legs)
        : ((footprint && footprint.width) || legs);

      const span = Math.max(legs, requestedSpan);
      const offset = Math.floor((span - 1) / 2);

      const points = [];
      for (let i = 0; i < legs; i++) {
        const t = legs === 1 ? 0 : i / (legs - 1);
        const lineOffset = Math.round((span - 1) * t) - offset;

        if (orientation === "vertical") {
          points.push({
            row: Math.max(0, Math.min(rows - 1, centerRow + lineOffset)),
            col: centerCol
          });
        } else {
          points.push({
            row: centerRow,
            col: Math.max(0, Math.min(cols - 1, centerCol + lineOffset))
          });
        }
      }

      return points;
    }

    function buildSplitPinPositions(legs, orientation, footprint) {
      const centerRow = Math.floor(rows / 2);
      const centerCol = Math.floor(cols / 2);

      const pinsPerSideA = Math.ceil(legs / 2);
      const pinsPerSideB = Math.floor(legs / 2);

      const width = (footprint && footprint.width) || 2;
      const height = (footprint && footprint.height) || Math.max(pinsPerSideA, pinsPerSideB);

      function distributedOffsets(count, span) {
        const safeSpan = Math.max(1, span);
        if (count <= 1) return [Math.floor((safeSpan - 1) / 2)];

        const offsets = [];
        for (let i = 0; i < count; i++) {
          offsets.push(Math.round((i * (safeSpan - 1)) / (count - 1)));
        }
        return offsets;
      }

      const points = [];

      if (orientation === "vertical") {
        const leftCol = Math.max(0, Math.min(cols - 1, centerCol - Math.floor((width - 1) / 2)));
        const rightCol = Math.max(0, Math.min(cols - 1, leftCol + (width - 1)));
        const topRow = centerRow - Math.floor((height - 1) / 2);
        const leftOffsets = distributedOffsets(pinsPerSideA, height);
        const rightOffsets = distributedOffsets(pinsPerSideB, height);

        for (let i = 0; i < leftOffsets.length; i++) {
          points.push({
            row: Math.max(0, Math.min(rows - 1, topRow + leftOffsets[i])),
            col: leftCol
          });
        }

        for (let i = 0; i < rightOffsets.length; i++) {
          points.push({
            row: Math.max(0, Math.min(rows - 1, topRow + rightOffsets[i])),
            col: rightCol
          });
        }
      } else {
        const topRow = Math.max(0, Math.min(rows - 1, centerRow - Math.floor((height - 1) / 2)));
        const bottomRow = Math.max(0, Math.min(rows - 1, topRow + (height - 1)));
        const leftCol = centerCol - Math.floor((width - 1) / 2);
        const topOffsets = distributedOffsets(pinsPerSideA, width);
        const bottomOffsets = distributedOffsets(pinsPerSideB, width);

        for (let i = 0; i < topOffsets.length; i++) {
          points.push({
            row: topRow,
            col: Math.max(0, Math.min(cols - 1, leftCol + topOffsets[i]))
          });
        }

        for (let i = 0; i < bottomOffsets.length; i++) {
          points.push({
            row: bottomRow,
            col: Math.max(0, Math.min(cols - 1, leftCol + bottomOffsets[i]))
          });
        }
      }

      return points;
    }

    function applyComponentEditor() {
      const compId = newCompIdInput.value.trim();
      const orientation = newCompOrientationSelect.value;
      const legs = Number(newCompLegsInput.value);
      const splitSides = newCompSplitSidesInput.checked;
      const labels = parseCsvList(newCompLabelsInput.value);
      const nets = parseCsvList(newCompNetsInput.value);
      let footprint;

      try {
        footprint = parseSizeInput(newCompSizeInput.value);
      } catch (err) {
        alert(err.message);
        return;
      }

      if (!compId) {
        alert("Component ID is required.");
        return;
      }

      if (boardData.components.some(c => c.id === compId)) {
        alert(`Component ID '${compId}' already exists.`);
        return;
      }

      if (!Number.isInteger(legs) || legs < 2) {
        alert("Number of legs must be an integer >= 2.");
        return;
      }

      const maxLegs = orientation === "vertical" ? rows : cols;
      if (legs > maxLegs) {
        alert(`Too many legs for ${orientation} placement. Max is ${maxLegs}.`);
        return;
      }

      if (splitSides && legs < 4) {
        alert("Split mode needs at least 4 legs.");
        return;
      }

      if (splitSides && (footprint.width || 2) < 2 && orientation === "vertical") {
        alert("Split vertical mode needs size width >= 2 (for two sides).");
        return;
      }

      if (splitSides && (footprint.height || 2) < 2 && orientation === "horizontal") {
        alert("Split horizontal mode needs size height >= 2 (for two sides).");
        return;
      }

      const pinsPerSideA = Math.ceil(legs / 2);
      const pinsPerSideB = Math.floor(legs / 2);
      const effectiveFootprint = {
        width: footprint.width || (splitSides ? (orientation === "vertical" ? 2 : Math.max(pinsPerSideA, pinsPerSideB)) : (orientation === "horizontal" ? legs : 1)),
        height: footprint.height || (splitSides ? (orientation === "vertical" ? Math.max(pinsPerSideA, pinsPerSideB) : 2) : (orientation === "vertical" ? legs : 1))
      };

      const pinPositions = splitSides
        ? buildSplitPinPositions(legs, orientation, footprint)
        : buildLinearPinPositions(legs, orientation, footprint);
      const pins = [];
      const pinMap = {};

      for (let i = 0; i < legs; i++) {
        const pinId = labels[i] || String(i + 1);
        pins.push({ id: pinId, net: nets[i] || "" });
        pinMap[pinId] = pinPositions[i];
      }

      boardData.components.push({
        id: compId,
        canRotate: true,
        orientation,
        splitSides,
        footprint: effectiveFootprint,
        pins
      });
      boardData.pins[compId] = pinMap;

      selectedComponentId = compId;
      closeComponentEditor();
      render();
    }

    dataModal.addEventListener("click", (e) => {
      if (e.target === dataModal) {
        closeDataEditor();
      }
    });

    componentModal.addEventListener("click", (e) => {
      if (e.target === componentModal) {
        closeComponentEditor();
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (dataModal.style.display === "flex") {
          closeDataEditor();
          return;
        }

        if (componentModal.style.display === "flex") {
          closeComponentEditor();
          return;
        }
      }

      if (dataModal.style.display === "flex" || componentModal.style.display === "flex") {
        return;
      }

      const active = document.activeElement;
      const isTextInput =
        active?.tagName === "INPUT" &&
        ["", "text", "search", "url", "email", "password", "number", "tel"].includes((active.getAttribute("type") || "").toLowerCase());
      const isTyping =
        isTextInput ||
        active?.tagName === "TEXTAREA" ||
        active?.isContentEditable;

      if (isTyping) return;

      if ((e.key === "r" || e.key === "R") && selectedComponentId) {
        e.preventDefault();
        rotateComponentClockwise(selectedComponentId);
        render();
        return;
      }

      if (e.key === "d" || e.key === "D") {
        e.preventDefault();
        duplicateSelectedComponent();
        return;
      }

      if (e.key === "c" || e.key === "C") {
        e.preventDefault();
        openComponentEditor();
      }
    });

    // ---------------- CONNECTIVITY ----------------

    function neighbors(r, c) {
      const n = [];

      // horizontal (strip unless cut)
      if (c > 0 && !boardData.cuts.some(x => x.row === r && x.col === c - 1)) n.push([r, c - 1]);
      if (c < cols - 1 && !boardData.cuts.some(x => x.row === r && x.col === c)) n.push([r, c + 1]);

      // jumpers
      boardData.jumpers.forEach(j => {
        if (j.from.row === r && j.from.col === c)
          n.push([j.to.row, j.to.col]);
        if (j.to.row === r && j.to.col === c)
          n.push([j.from.row, j.from.col]);
      });

      return n;
    }

    // only start flood from USED holes
    function getUsedHoles() {
      const set = new Set();

      Object.values(boardData.pins).forEach(compPins => {
        Object.values(compPins).forEach(p => {
          set.add(key(p.row, p.col));
        });
      });

      boardData.jumpers.forEach(j => {
        set.add(key(j.from.row, j.from.col));
        set.add(key(j.to.row, j.to.col));
      });

      return set;
    }

    function flood(startR, startC) {
      const visited = new Set();
      const stack = [[startR, startC]];

      while (stack.length) {
        const [r, c] = stack.pop();
        const k = key(r, c);
        if (visited.has(k)) continue;

        visited.add(k);

        neighbors(r, c).forEach(n => {
          if (!visited.has(key(n[0], n[1])))
            stack.push(n);
        });
      }

      return visited;
    }

    let overlayOn = false;
    function drawOverlay() {
      const used = getUsedHoles();
      const seen = new Set();

      const g = create("g", { id: "overlayLayer" });

      used.forEach(k => {
        if (seen.has(k)) return;

        const [r, c] = k.split(',').map(Number);
        const region = flood(r, c);

        region.forEach(x => seen.add(x));

        // ---- DRAW STRIP SEGMENTS ----
        // Only draw between relevant used points (component pins / jumper ends)
        // so the glow does not continue through empty strip sections.
        for (let rr = 0; rr < rows; rr++) {
          let runStart = 0;

          for (let cc = 0; cc < cols; cc++) {
            const atRunEnd = cc === cols - 1 || boardData.cuts.some(cut => cut.row === rr && cut.col === cc);
            if (!atRunEnd) continue;

            const runEnd = cc;
            const relevantCols = [];

            for (let c2 = runStart; c2 <= runEnd; c2++) {
              const holeKey = key(rr, c2);
              if (region.has(holeKey) && used.has(holeKey)) {
                relevantCols.push(c2);
              }
            }

            if (relevantCols.length > 0) {
              const startCol = relevantCols[0];
              const endCol = relevantCols[relevantCols.length - 1];

              const p1 = pos(rr, startCol);
              const p2 = pos(rr, endCol);

              g.appendChild(create("line", {
                x1: p1.x,
                y1: p1.y,
                x2: p2.x,
                y2: p2.y,
                stroke: "rgba(0,0,255,0.4)",
                "stroke-width": 16,
                "stroke-linecap": "round",
                filter: "blur(1.5px)"
              }));
            }

            runStart = cc + 1;
          }
        }

        // ---- DRAW JUMPER OVERLAY ----
        boardData.jumpers.forEach(j => {
          const k1 = key(j.from.row, j.from.col);
          const k2 = key(j.to.row, j.to.col);

          if (region.has(k1) && region.has(k2)) {
            const p1 = pos(j.from.row, j.from.col);
            const p2 = pos(j.to.row, j.to.col);

            g.appendChild(create("line", {
              x1: p1.x,
              y1: p1.y,
              x2: p2.x,
              y2: p2.y,
              stroke: "rgba(0,0,255,0.5)",
              "stroke-width": 12,
              "stroke-linecap": "round",
              filter: "blur(1.5px)"
            }));
          }
        });

      });

      svg.appendChild(g);
    }
    function clearOverlay() {
      const el = document.getElementById("overlayLayer");
      if (el) el.remove();
    }

    function toggleOverlay() {
      overlayOn = !overlayOn;
      render();
    }


    function drawStrips() {

      // ---------------- DRAW STRIPS ----------------

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols - 1; c++) {

          const hasCut = boardData.cuts.some(cut => cut.row === r && cut.col === c);

          if (!hasCut) {
            const p1 = pos(r, c);
            const p2 = pos(r, c + 1);

            svg.appendChild(create("line", {
              x1: p1.x,
              y1: p1.y,
              x2: p2.x,
              y2: p2.y,
              class: "strip"
            }));
          }
        }

        for (let c = 0; c < cols; c++) {
          const p = pos(r, c);
          svg.appendChild(create("circle", {
            cx: p.x,
            cy: p.y,
            r: 3,
            class: "hole"
          }));
        }
      }



    }


    function drawCuts() {
      boardData.cuts.forEach((cut, index) => {
        const p = pos(cut.row, cut.col);

        const line = create("line", {
          x1: p.x + 6,
          y1: p.y - 5,
          x2: p.x + 20,
          y2: p.y + 5,
          class: "cut"
        });

        line.dataset.cutIndex = index;
        line.style.cursor = "pointer";

        svg.appendChild(line);
      });
    }


    function drawJumpers() {

      boardData.jumpers.forEach((j, index) => {

        const p1 = pos(j.from.row, j.from.col);
        const p2 = pos(j.to.row, j.to.col);

        // wire (NOT draggable)
        const wire = create("line", {
          x1: p1.x,
          y1: p1.y,
          x2: p2.x,
          y2: p2.y,
          class: "jumper"
        });

        wire.dataset.jumperIndex = index;
        wire.style.cursor = "pointer";
        svg.appendChild(wire);

        // ---- HANDLE 1 ----
        const h1 = create("circle", {
          cx: p1.x,
          cy: p1.y,
          r: 6,
          fill: "white",
          stroke: "green",
          "stroke-width": 2
        });

        h1.dataset.jumperIndex = index;
        h1.dataset.end = "from";
        h1.style.cursor = "grab";

        svg.appendChild(h1);

        // ---- HANDLE 2 ----
        const h2 = create("circle", {
          cx: p2.x,
          cy: p2.y,
          r: 6,
          fill: "white",
          stroke: "green",
          "stroke-width": 2
        });

        h2.dataset.jumperIndex = index;
        h2.dataset.end = "to";
        h2.style.cursor = "grab";

        svg.appendChild(h2);
      });

    }


    function drawComponents() {

      labelPinsByNet = document.getElementById("labelByNet")?.checked ?? false;

      boardData.components.forEach(comp => {

        const pins = comp.pins.map(pin => {
          const pl = boardData.pins[comp.id]?.[pin.id];
          if (!pl) return null;
          return { ...pin, ...pos(pl.row, pl.col), row: pl.row, col: pl.col };
        }).filter(Boolean);

        // Render legacy DIP-8 style packages (two columns of four pins) as a chip body.
        if (pins.length === 8 && !comp.footprint) {
          const colsUsed = [...new Set(pins.map(pin => pin.col))].sort((a, b) => a - b);

          if (colsUsed.length === 2) {
            const leftPins = pins
              .filter(pin => pin.col === colsUsed[0])
              .sort((a, b) => a.row - b.row);
            const rightPins = pins
              .filter(pin => pin.col === colsUsed[1])
              .sort((a, b) => a.row - b.row);

            if (leftPins.length === 4 && rightPins.length === 4) {
              const bodyLeft = leftPins[0].x + 8;
              const bodyRight = rightPins[0].x - 8;
              const allY = pins.map(pin => pin.y);
              const top = Math.min(...allY) - 10;
              const bottom = Math.max(...allY) + 10;

              leftPins.forEach(pin => {
                svg.appendChild(create("line", {
                  x1: pin.x,
                  y1: pin.y,
                  x2: bodyLeft,
                  y2: pin.y,
                  class: "lead"
                }));
              });

              rightPins.forEach(pin => {
                svg.appendChild(create("line", {
                  x1: pin.x,
                  y1: pin.y,
                  x2: bodyRight,
                  y2: pin.y,
                  class: "lead"
                }));
              });

              const body = create("rect", {
                x: bodyLeft,
                y: top,
                width: bodyRight - bodyLeft,
                height: bottom - top,
                rx: 4,
                class: "component"
              });

              body.dataset.compId = comp.id;
              body.style.cursor = "grab";
              svg.appendChild(body);

              const notchX = (bodyLeft + bodyRight) / 2;
              svg.appendChild(create("circle", {
                cx: notchX,
                cy: top + 5,
                r: 2.5,
                fill: "black"
              }));

              svg.appendChild(create("text", {
                x: notchX,
                y: top - 6,
                class: "label"
              })).textContent = comp.id;

              pins.forEach(pin => {
                svg.appendChild(create("circle", {
                  cx: pin.x,
                  cy: pin.y,
                  r: 5,
                  class: "pin"
                }));

                const isLeft = pin.col === colsUsed[0];
                svg.appendChild(create("text", {
                  x: isLeft ? pin.x - 8 : pin.x + 8,
                  y: pin.y - 8,
                  class: "label",
                  "text-anchor": isLeft ? "end" : "start"
                })).textContent = labelPinsByNet ? (pin.net || pin.id) : pin.id;
              });

              return;
            }
          }
        }

        if (pins.length < 2) return;

        const colsUsed = [...new Set(pins.map(pin => pin.col))].sort((a, b) => a - b);
        const rowsUsed = [...new Set(pins.map(pin => pin.row))].sort((a, b) => a - b);
        const minX = Math.min(...pins.map(pin => pin.x));
        const maxX = Math.max(...pins.map(pin => pin.x));
        const minY = Math.min(...pins.map(pin => pin.y));
        const maxY = Math.max(...pins.map(pin => pin.y));
        const hasFootprint =
          comp.footprint &&
          Number.isInteger(comp.footprint.width) && comp.footprint.width >= 1 &&
          Number.isInteger(comp.footprint.height) && comp.footprint.height >= 1;
        const centerX = pins.reduce((sum, pin) => sum + pin.x, 0) / pins.length;
        const centerY = pins.reduce((sum, pin) => sum + pin.y, 0) / pins.length;
        const footprintBounds = hasFootprint
          ? {
            left: centerX - ((comp.footprint.width - 1) * spacing) / 2,
            right: centerX + ((comp.footprint.width - 1) * spacing) / 2,
            top: centerY - ((comp.footprint.height - 1) * spacing) / 2,
            bottom: centerY + ((comp.footprint.height - 1) * spacing) / 2
          }
          : null;

        if (pins.length >= 4 && colsUsed.length === 2) {
          const leftX = pos(0, colsUsed[0]).x;
          const rightX = pos(0, colsUsed[1]).x;
          let bodyLeft = leftX + 8;
          let bodyRight = rightX - 8;
          let bodyTop = minY - 10;
          let bodyBottom = maxY + 10;

          if (footprintBounds) {
            bodyLeft = footprintBounds.left + 8;
            bodyRight = footprintBounds.right - 8;
            bodyTop = footprintBounds.top - 10;
            bodyBottom = footprintBounds.bottom + 10;
          }

          if (bodyRight - bodyLeft < 8) {
            bodyLeft = leftX + 8;
            bodyRight = rightX - 8;
          }

          pins.forEach(pin => {
            const isLeft = pin.col === colsUsed[0];
            svg.appendChild(create("line", {
              x1: pin.x,
              y1: pin.y,
              x2: isLeft ? bodyLeft : bodyRight,
              y2: pin.y,
              class: "lead"
            }));
          });

          const body = create("rect", {
            x: bodyLeft,
            y: bodyTop,
            width: bodyRight - bodyLeft,
            height: bodyBottom - bodyTop,
            rx: 4,
            class: "component"
          });

          body.dataset.compId = comp.id;
          body.style.cursor = "grab";
          svg.appendChild(body);

          const notchX = (bodyLeft + bodyRight) / 2;
          svg.appendChild(create("circle", {
            cx: notchX,
            cy: bodyTop + 5,
            r: 2.5,
            fill: "black"
          }));

          svg.appendChild(create("text", {
            x: notchX,
            y: bodyTop - 6,
            class: "label"
          })).textContent = comp.id;

          pins.forEach(pin => {
            svg.appendChild(create("circle", {
              cx: pin.x,
              cy: pin.y,
              r: 5,
              class: "pin"
            }));

            const isLeft = pin.col === colsUsed[0];
            svg.appendChild(create("text", {
              x: isLeft ? pin.x - 8 : pin.x + 8,
              y: pin.y - 8,
              class: "label",
              "text-anchor": isLeft ? "end" : "start"
            })).textContent = labelPinsByNet ? (pin.net || pin.id) : pin.id;
          });

          return;
        }

        if (pins.length >= 4 && rowsUsed.length === 2) {
          const topY = pos(rowsUsed[0], 0).y;
          const bottomY = pos(rowsUsed[1], 0).y;
          let bodyTop = topY + 8;
          let bodyBottom = bottomY - 8;
          let bodyLeft = minX - 10;
          let bodyRight = maxX + 10;

          if (footprintBounds) {
            bodyTop = footprintBounds.top + 8;
            bodyBottom = footprintBounds.bottom - 8;
            bodyLeft = footprintBounds.left - 10;
            bodyRight = footprintBounds.right + 10;
          }

          if (bodyBottom - bodyTop < 8) {
            bodyTop = topY + 8;
            bodyBottom = bottomY - 8;
          }

          pins.forEach(pin => {
            const isTop = pin.row === rowsUsed[0];
            svg.appendChild(create("line", {
              x1: pin.x,
              y1: pin.y,
              x2: pin.x,
              y2: isTop ? bodyTop : bodyBottom,
              class: "lead"
            }));
          });

          const body = create("rect", {
            x: bodyLeft,
            y: bodyTop,
            width: bodyRight - bodyLeft,
            height: bodyBottom - bodyTop,
            rx: 4,
            class: "component"
          });

          body.dataset.compId = comp.id;
          body.style.cursor = "grab";
          svg.appendChild(body);

          const notchX = (bodyLeft + bodyRight) / 2;
          svg.appendChild(create("circle", {
            cx: notchX,
            cy: bodyTop + 5,
            r: 2.5,
            fill: "black"
          }));

          svg.appendChild(create("text", {
            x: notchX,
            y: bodyTop - 6,
            class: "label"
          })).textContent = comp.id;

          pins.forEach(pin => {
            svg.appendChild(create("circle", {
              cx: pin.x,
              cy: pin.y,
              r: 5,
              class: "pin"
            }));

            svg.appendChild(create("text", {
              x: pin.x,
              y: pin.row === rowsUsed[0] ? pin.y - 8 : pin.y + 14,
              class: "label"
            })).textContent = labelPinsByNet ? (pin.net || pin.id) : pin.id;
          });

          return;
        }

        const horizontal = (maxX - minX) >= (maxY - minY);
        const orderedPins = [...pins].sort((a, b) => horizontal ? (a.x - b.x) : (a.y - b.y));
        const p1 = orderedPins[0];
        const p2 = orderedPins[orderedPins.length - 1];

        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;

        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const angleDeg = angle * 180 / Math.PI;

        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;

        const footprintSpan = hasFootprint
          ? (horizontal ? (comp.footprint.width - 1) * spacing : (comp.footprint.height - 1) * spacing)
          : 0;
        const bodyLength = Math.max(25, length * 0.4, footprintSpan);
        const bodyThickness = 12;
        const half = bodyLength / 2;

        const lead1End = {
          x: midX - Math.cos(angle) * half,
          y: midY - Math.sin(angle) * half
        };

        const lead2End = {
          x: midX + Math.cos(angle) * half,
          y: midY + Math.sin(angle) * half
        };

        // leads
        svg.appendChild(create("line", {
          x1: p1.x, y1: p1.y,
          x2: lead1End.x, y2: lead1End.y,
          class: "lead"
        }));

        svg.appendChild(create("line", {
          x1: p2.x, y1: p2.y,
          x2: lead2End.x, y2: lead2End.y,
          class: "lead"
        }));

        const body = create("rect", {
          x: -half,
          y: -bodyThickness / 2,
          width: bodyLength,
          height: bodyThickness,
          class: "component",
          transform: `translate(${midX},${midY}) rotate(${angleDeg})`
        });

        body.dataset.compId = comp.id;
        body.style.cursor = "grab";

        svg.appendChild(body);

        // label
        svg.appendChild(create("text", {
          x: midX,
          y: midY - bodyThickness,
          class: "label"
        })).textContent = comp.id;

        // pins
        pins.forEach(pin => {
          svg.appendChild(create("circle", {
            cx: pin.x,
            cy: pin.y,
            r: 5,
            class: "pin"
          }));

          svg.appendChild(create("text", {
            x: pin.x,
            y: pin.y - 8,
            class: "label"
          })).textContent = labelPinsByNet ? (pin.net || pin.id) : pin.id;
        });

      });
    }



    function render() {
      svg.innerHTML = "";

      const cutsOnTop = document.getElementById("cutsOnTop")?.checked ?? false;

      if (overlayOn) drawOverlay();
      drawStrips();
      if (!cutsOnTop) drawCuts();

      drawJumpers();
      drawComponents();

      if (cutsOnTop) drawCuts();
    }

    svg.addEventListener("mousedown", (e) => {
      e.preventDefault();

      const compId = e.target.dataset.compId;
      const jumperIndex = e.target.dataset.jumperIndex;
      const cutIndex = e.target.dataset.cutIndex;
      const end = e.target.dataset.end;

      if (compId) {
        selectedComponentId = compId;
        dragging = { type: "component", compId };
      }
      else if (jumperIndex !== undefined) {
        dragging = {
          type: "jumper-end",
          index: Number(jumperIndex),
          end
        };
      }
      else if (cutIndex !== undefined) {
        dragging = { type: "cut", index: Number(cutIndex) };
      }
    });

    svg.addEventListener("mousemove", (e) => {
      if (!dragging) return;

      const snapped = snap(e.offsetX, e.offsetY);

      // ---------------- COMPONENT ----------------
      if (dragging.type === "component") {
        const comp = boardData.components.find(c => c.id === dragging.compId);

        const firstPin = comp.pins[0];
        const old = boardData.pins[comp.id][firstPin.id];

        const dRow = snapped.row - old.row;
        const dCol = snapped.col - old.col;

        comp.pins.forEach(pin => {
          const p = boardData.pins[comp.id][pin.id];

          boardData.pins[comp.id][pin.id] = {
            row: p.row + dRow,
            col: p.col + dCol
          };
        });
      }

      // ---------------- JUMPER END ----------------
      if (dragging.type === "jumper-end") {
        const j = boardData.jumpers[dragging.index];
        j[dragging.end] = snapped;
      }

      // ---------------- CUT ----------------
      if (dragging.type === "cut") {
        boardData.cuts[dragging.index] = snapped;
      }

      render();
    });

    svg.addEventListener("click", (e) => {

      // ignore if dragging
      if (dragging) return;

      const snapped = snap(e.offsetX, e.offsetY);

      // Ctrl+click: toggle a cut at this hole
      if (e.ctrlKey) {
        const compId = e.target.dataset.compId;
        if (compId) {
          const compIndex = boardData.components.findIndex(c => c.id === compId);
          if (compIndex >= 0) {
            boardData.components.splice(compIndex, 1);
            delete boardData.pins[compId];
            if (selectedComponentId === compId) {
              selectedComponentId = null;
            }
            render();
            return;
          }
        }

        const jumperIndex = e.target.dataset.jumperIndex;
        if (jumperIndex !== undefined) {
          boardData.jumpers.splice(Number(jumperIndex), 1);
          creatingJumper = null;
          render();
          return;
        }

        const existingIndex = boardData.cuts.findIndex(cut =>
          cut.row === snapped.row && cut.col === snapped.col
        );

        if (existingIndex >= 0) {
          boardData.cuts.splice(existingIndex, 1);
        } else {
          boardData.cuts.push(snapped);
        }

        render();
        return;
      }

      // Jumper creation is only active while Shift is held
      if (!e.shiftKey) return;

      // first click â†’ start
      if (!creatingJumper) {
        creatingJumper = { from: snapped };
        return;
      }

      // second click â†’ complete
      boardData.jumpers.push({
        from: creatingJumper.from,
        to: snapped
      });

      creatingJumper = null;
      render();
    });




    window.addEventListener("mouseup", () => {
      dragging = null;
    });


    render();

  </script>
</body>
